<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GartenBau">
<meta name="theme-color" content="#ffffff">
<title>GartenBau Manager</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#f4f6f3;color:#1a2e1a;font-family:Georgia,serif;overscroll-behavior:none}
input,select,textarea{font-family:Georgia,serif;font-size:16px}
button{font-family:Georgia,serif}
.page{min-height:100dvh;background:#f4f6f3;padding-bottom:88px}

/* Bottom Nav */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #d8e8d0;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-btn{flex:1;background:none;border:none;color:#aac4aa;padding:10px 0 8px;cursor:default;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;margin-top:-2px;font-size:10px;letter-spacing:.3px}
.nav-btn.active{color:#2d6a4f;border-top:2px solid #2d6a4f}
.nav-btn.enabled{cursor:pointer;color:#5a8a5a}
.nav-icon{font-size:22px;display:block}

/* Header */
.page-header{background:#fff;border-bottom:1px solid #d8e8d0;padding:12px 16px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.header-brand{font-size:8px;color:#8aaa8a;letter-spacing:2px;text-transform:uppercase;margin-bottom:1px}
.header-title{font-size:18px;font-weight:bold;color:#2d6a4f}
.header-sub{font-size:12px;color:#5a8a5a;margin-top:1px}

/* Logo */
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:38px;height:38px;flex-shrink:0}

/* Cards & forms */
.card{background:#fff;border:1px solid #d8e8d0;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-accent{border:2px solid #2d6a4f}
.inp{background:#f8faf7;border:1px solid #c8dcc0;border-radius:10px;color:#1a2e1a;padding:13px 14px;font-size:16px;width:100%;outline:none;-webkit-appearance:none;display:block}
.inp:focus{border-color:#2d6a4f;background:#fff}
.flabel{font-size:11px;color:#7a9a7a;margin-bottom:4px;letter-spacing:.3px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* Buttons */
.btn{border:none;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-weight:600;display:inline-block}
.btn-green{background:#2d6a4f;color:#fff;padding:13px 18px;font-size:15px}
.btn-ghost{background:transparent;border:1px solid #c8dcc0;color:#5a8a5a;padding:13px 18px;font-size:15px}
.btn-danger{background:#fdf0f0;border:1px solid #e8b0b0;color:#c04040;padding:13px 18px;font-size:15px}
.btn-small{padding:8px 14px;font-size:13px}
.btn-full{width:100%}
.btn-icon{background:none;border:none;cursor:pointer;font-size:20px;padding:4px 8px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px}
.sec-title{font-size:13px;color:#2d6a4f;font-weight:bold}
.sec-add{background:#f0f8f0;border:1px solid #c8dcc0;color:#2d6a4f;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;font-family:Georgia,serif}
.item-row{background:#f8faf7;border:1px solid #e0ead8;border-radius:10px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.remove-btn{background:#fdf0f0;border:1px solid #e8b0b0;color:#c04040;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;width:100%;font-family:Georgia,serif}
.sum-line{display:flex;justify-content:space-between;margin-bottom:6px}

/* Calendar */
.cal-wrap{background:#fff;border:1px solid #d8e8d0;border-radius:12px;overflow:hidden;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.cal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px}
.cal-nav{background:#f0f8f0;border:1px solid #c8dcc0;color:#2d6a4f;border-radius:8px;width:40px;height:40px;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 8px 10px}
.cal-day-label{text-align:center;font-size:10px;color:#9ab09a;padding-bottom:4px}
.cal-cell{border-radius:8px;min-height:54px;cursor:pointer;padding:4px 3px;border:1px solid #e0ead8;background:#f8faf7}
.cal-cell-num{font-size:11px;color:#5a8a5a;text-align:center}

/* Baustelle cards */
.bau-card{background:#fff;border:1px solid #d8e8d0;border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.bau-stripe{height:5px}
.bau-body{padding:12px 14px 14px}
.mini-stat{background:#f4f6f3;border-radius:8px;padding:7px 6px;text-align:center}
.mini-stat-val{font-size:14px;font-weight:bold}
.mini-stat-lbl{font-size:10px;color:#9ab09a;margin-top:1px}

/* Chips */
.chip{background:#f0f8f0;border:1px solid #c8dcc0;border-radius:6px;padding:2px 8px;font-size:11px;color:#2d6a4f;display:inline-block}
.chip-dim{background:#f4f6f3;border-color:#e0ead8;color:#8aaa8a}

/* DChip */
.dchip{background:#f4f6f3;border-radius:8px;padding:8px 10px}
.dchip-label{font-size:10px;color:#8aaa8a}
.dchip-val{font-size:14px;font-weight:bold;color:#1a2e1a}
.dchip-sub{font-size:11px;color:#5a8a5a}

/* Rechnung */
.r-block{margin-bottom:14px}
.r-block-title{font-size:12px;color:#2d6a4f;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #d8e8d0;padding-bottom:4px}
.r-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0}
.r-row-label{font-size:13px;color:#1a2e1a}
.r-row-det{font-size:11px;color:#8aaa8a}
.r-row-val{font-size:13px;color:#2d6a4f;min-width:80px;text-align:right;font-weight:600}

/* Textarea */
textarea.inp{resize:vertical;min-height:70px;line-height:1.6}

/* Print */
@media print {
  #bottom-nav,.page-header,.no-print{display:none!important}
  #print-overlay .no-print{display:none!important}
  #print-overlay{position:static!important;overflow:visible!important}
  body{overflow:auto!important}
}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:#9ab09a}
.cost-box{background:#fff;border:2px solid #2d6a4f;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.krow{background:#f4f6f3;border-radius:8px;padding:7px 10px}
.krow-label{font-size:10px;color:#8aaa8a}
.krow-val{font-size:13px;font-weight:bold;color:#1a2e1a}
.day-entry{background:#fff;border:1px solid #d8e8d0;border-radius:10px;padding:10px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.tagebuch-card{background:#fff;border:1px solid #d8e8d0;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.total-line{margin-top:10px;text-align:right;font-size:15px;font-weight:bold;color:#2d6a4f;border-top:1px solid #e0ead8;padding-top:8px}
.self-badge{background:#e8f4e8;border:1px solid #b0d4b0;border-radius:5px;font-size:10px;color:#2d6a4f;padding:1px 6px;margin-left:6px;font-weight:bold}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Storage ───────────────────────────────────────────────────────────────────
const SK="gartenbau_v4";
const load=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const save=(d)=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};

// ── Helpers ───────────────────────────────────────────────────────────────────
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=(d)=>{if(!d)return"–";const[y,m,dy]=d.split("-");return dy+"."+m+"."+y;};
const today=()=>new Date().toISOString().slice(0,10);
const MONTHS=["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const DAYS=["So","Mo","Di","Mi","Do","Fr","Sa"];
const PALETTE=["#2d6a4f","#1e4d8c","#7b2d8b","#b5382a","#c05c1a","#2a7a8a","#5a6e1a","#7a3b1e"];
const bc=(i)=>PALETTE[i%PALETTE.length];
const esc=(s)=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const makeInput=(type,value,onchange,placeholder="")=>{
  const el=document.createElement(type==="textarea"?"textarea":"input");
  if(type!=="textarea")el.type=type;
  el.className="inp";el.value=value??"";
  if(placeholder)el.placeholder=placeholder;
  el.addEventListener("input",e=>onchange(e.target.value));
  return el;
};
const makeSelect=(options,value,onchange)=>{
  const el=document.createElement("select");el.className="inp";
  for(const o of options){const opt=document.createElement("option");opt.value=o;opt.textContent=o;if(o===value)opt.selected=true;el.appendChild(opt);}
  el.addEventListener("change",e=>onchange(e.target.value));return el;
};
const makeLabel=(text)=>{const d=document.createElement("div");d.className="flabel";d.textContent=text;return d;};
const makeField=(label,inputEl)=>{const w=document.createElement("div");w.appendChild(makeLabel(label));w.appendChild(inputEl);return w;};
const makeBtn=(label,cls,onclick)=>{const b=document.createElement("button");b.className="btn "+cls;b.innerHTML=label;b.addEventListener("click",onclick);return b;};

// SVG Logo
const LOGO_SVG=`<svg viewBox="0 0 38 38" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky background -->
  <rect width="38" height="38" rx="9" fill="#e8f4e8"/>
  <!-- Ground -->
  <rect x="0" y="26" width="38" height="12" rx="0" fill="#c8e0b8"/>
  <rect x="0" y="33" width="38" height="5" rx="0" fill="#a0c890"/>
  <!-- House -->
  <rect x="6" y="18" width="14" height="10" fill="#fff" stroke="#2d6a4f" stroke-width="1.2"/>
  <polygon points="6,18 13,11 20,18" fill="#2d6a4f"/>
  <rect x="10" y="22" width="4" height="6" fill="#b0d4b0"/>
  <!-- Tree / plant -->
  <rect x="24" y="22" width="3" height="8" fill="#8b5e3c"/>
  <circle cx="25.5" cy="18" r="6" fill="#3a8a50"/>
  <circle cx="22" cy="20" r="4" fill="#2d6a4f"/>
  <circle cx="29" cy="20" r="4" fill="#4aaa60"/>
  <!-- Bagger simplified -->
  <rect x="1" y="27" width="12" height="5" rx="2" fill="#e8a020"/>
  <rect x="3" y="25" width="7" height="3" rx="1" fill="#d09010"/>
  <line x1="10" y1="26" x2="15" y2="23" stroke="#c07800" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="15" y1="23" x2="17" y2="26" stroke="#c07800" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="1" y="31" width="3" height="3" rx="1.5" fill="#555"/>
  <rect x="8" y="31" width="3" height="3" rx="1.5" fill="#555"/>
</svg>`;

// ── State ─────────────────────────────────────────────────────────────────────
let state={baustellen:[],activeId:null,page:"uebersicht",firmendaten:{firmaName:"",ustNr:"",bank:"",iban:"",bic:"",tel:"",email:"",strasse:"",plzOrt:""},letzeSicherung:null};
const saved=load();
if(saved){
  state={...state,...saved};
  if(!state.firmendaten)state.firmendaten={firmaName:"",ustNr:"",bank:"",iban:"",bic:"",tel:"",email:"",strasse:"",plzOrt:""};
  if(!state.letzeSicherung)state.letzeSicherung=null;
}
function saveState(){save({baustellen:state.baustellen,activeId:state.activeId,firmendaten:state.firmendaten,letzeSicherung:state.letzeSicherung});}
function setState(patch){Object.assign(state,typeof patch==="function"?patch(state):patch);saveState();render();}
function getActive(){return state.baustellen.find(b=>b.id===state.activeId);}
function updBaustelle(id,patch){state.baustellen=state.baustellen.map(b=>b.id===id?{...b,...patch}:b);saveState();render();}

// ── Render root ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const ab=getActive();
  let page;
  if(state.page==="uebersicht")page=renderUebersicht();
  else if(state.page==="kalender")page=renderKalenderGlobal();
  else if(state.page==="planung"&&ab)page=renderPlanung(ab);
  else if(state.page==="leistung"&&ab)page=renderLeistung(ab);
  else if(state.page==="rechnung"&&ab)page=renderRechnung(ab);
  else page=renderUebersicht();
  app.appendChild(page);
  app.appendChild(renderBottomNav(ab));
}

// ── Logo helper ───────────────────────────────────────────────────────────────
function makeLogo(){const d=document.createElement("div");d.className="logo-icon";d.innerHTML=LOGO_SVG;return d;}

// ── Bottom Nav ─────────────────────────────────────────────────────────────────
function renderBottomNav(ab){
  const nav=document.createElement("nav");nav.id="bottom-nav";
  const items=[
    {key:"uebersicht",icon:"🏠",label:"Baustellen"},
    {key:"kalender",icon:"📅",label:"Kalender"},
    {key:"planung",icon:"📋",label:"Planung",needs:true},
    {key:"leistung",icon:"✅",label:"Leistung",needs:true},
    {key:"rechnung",icon:"🧾",label:"Rechnung",needs:true},
  ];
  for(const it of items){
    const disabled=it.needs&&!ab;
    const active=state.page===it.key;
    const btn=document.createElement("button");
    btn.className="nav-btn"+(active?" active":(!disabled?" enabled":""));
    btn.innerHTML=`<span class="nav-icon">${it.icon}</span>${it.label}`;
    if(!disabled)btn.addEventListener("click",()=>setState({page:it.key}));
    nav.appendChild(btn);
  }
  return nav;
}

// ── Page Header ───────────────────────────────────────────────────────────────
function makeHeader(title,sub,rightEl){
  const h=document.createElement("div");h.className="page-header";
  const left=document.createElement("div");left.className="logo-wrap";
  const txt=document.createElement("div");
  txt.innerHTML=`<div class="header-brand">${esc(state.firmendaten&&state.firmendaten.firmaName?state.firmendaten.firmaName:"Bau Manager")}</div><div class="header-title">${esc(title)}</div>${sub?`<div class="header-sub">${esc(sub)}</div>`:""}`;
  left.appendChild(txt);h.appendChild(left);
  if(rightEl)h.appendChild(rightEl);
  return h;
}

// ── ÜBERSICHT ─────────────────────────────────────────────────────────────────
function renderUebersicht(){
  const wrap=document.createElement("div");wrap.className="page";
  let showForm=false;
  let formData={name:"",startdatum:today(),bauherr:"",adresse:""};
  const rebuild=()=>{
    wrap.innerHTML="";
    const rightBtn=makeBtn(showForm?"✕":"+ Neu","btn btn-green btn-small",()=>{showForm=!showForm;rebuild();});
    wrap.appendChild(makeHeader("Meine Baustellen",null,rightBtn));
    const content=document.createElement("div");content.style.cssText="padding:12px 14px";
    if(showForm){
      const form=document.createElement("div");form.className="card card-accent";
      const title=document.createElement("div");title.style.cssText="font-size:15px;font-weight:bold;color:#2d6a4f;margin-bottom:14px";title.textContent="Neue Baustelle anlegen";form.appendChild(title);
      const n=makeInput("text",formData.name,v=>{formData.name=v;},"z.B. Mustermann – Terrasse");
      form.appendChild(makeField("Baustellen-Name *",n));
      const dw=document.createElement("div");dw.style.marginTop="12px";
      dw.appendChild(makeField("Startdatum",makeInput("date",formData.startdatum,v=>{formData.startdatum=v;})));
      form.appendChild(dw);
      const bw=document.createElement("div");bw.style.marginTop="12px";
      bw.appendChild(makeField("Bauherr / Auftraggeber",makeInput("text",formData.bauherr,v=>{formData.bauherr=v;},"Name des Bauherrn")));
      form.appendChild(bw);
      const aw=document.createElement("div");aw.style.marginTop="12px";
      const ata=makeInput("textarea",formData.adresse,v=>{formData.adresse=v;},"Straße, PLZ Ort");
      ata.style.minHeight="60px";
      aw.appendChild(makeField("Rechnungsadresse",ata));form.appendChild(aw);
      const btnRow=document.createElement("div");btnRow.style.cssText="display:flex;gap:10px;margin-top:16px";
      btnRow.appendChild(makeBtn("✓ Anlegen & starten","btn btn-green btn-full",()=>{
        if(!formData.name.trim())return;
        const b={id:uid(),name:formData.name.trim(),startdatum:formData.startdatum||today(),bauherr:formData.bauherr,adresse:formData.adresse,erstellt:today(),tage:[],eintraege:[],stundensatz:55,maschinensatz:90,rechnungsNr:"",angebotNr:""};
        state.baustellen=[...state.baustellen,b];state.activeId=b.id;state.page="planung";saveState();render();
      }));
      btnRow.appendChild(makeBtn("Abbruch","btn btn-ghost",()=>{showForm=false;rebuild();}));
      form.appendChild(btnRow);content.appendChild(form);
    }
    if(state.baustellen.length===0&&!showForm){
      const empty=document.createElement("div");empty.className="empty";
      const bigLogo=document.createElement("div");bigLogo.style.cssText="width:80px;height:80px;margin:0 auto 16px";bigLogo.innerHTML=LOGO_SVG;
      empty.appendChild(bigLogo);
      const t=document.createElement("div");t.style.cssText="font-size:17px;color:#5a8a5a;margin-bottom:8px";t.textContent="Willkommen!";empty.appendChild(t);
      const s=document.createElement("div");s.style.cssText="font-size:13px;color:#9ab09a";s.textContent="Lege deine erste Baustelle an oder öffne den Kalender.";empty.appendChild(s);
      const kb=makeBtn("📅 Kalender öffnen","btn btn-ghost",()=>setState({page:"kalender"}));kb.style.marginTop="16px";empty.appendChild(kb);
      content.appendChild(empty);
    }
    for(let idx=0;idx<state.baustellen.length;idx++){
      const b=state.baustellen[idx];const col=bc(idx);
      const ih=(b.eintraege||[]).reduce((a,e)=>a+(e.personalStunden||[]).filter(p=>p.istIch).reduce((s,p)=>s+(p.stunden||0),0),0);
      const ph=(b.eintraege||[]).reduce((a,e)=>a+(e.personalStunden||[]).filter(p=>!p.istIch).reduce((s,p)=>s+(p.stunden||0),0),0);
      const matS=(b.eintraege||[]).reduce((a,e)=>a+(e.material||[]).reduce((s,m)=>s+(m.menge||0)*(m.preis||0),0),0);
      const card=document.createElement("div");card.className="bau-card";
      const stripe=document.createElement("div");stripe.className="bau-stripe";stripe.style.background=col;card.appendChild(stripe);
      const body=document.createElement("div");body.className="bau-body";
      const topRow=document.createElement("div");topRow.style.cssText="display:flex;justify-content:space-between;align-items:flex-start";
      const nameDiv=document.createElement("div");nameDiv.style.flex="1";
      nameDiv.innerHTML=`<div style="font-size:17px;font-weight:bold;color:#1a2e1a">${esc(b.name)}</div><div style="font-size:13px;color:#5a8a5a;margin-top:4px">📅 ${fmt(b.startdatum)}${b.bauherr?` · 👤 ${esc(b.bauherr)}`:""}`;
      const delBtn=document.createElement("button");delBtn.style.cssText="background:none;border:none;color:#c0c0c0;font-size:22px;padding:0 0 0 12px;cursor:pointer";delBtn.textContent="✕";
      delBtn.addEventListener("click",e=>{e.stopPropagation();if(!confirm("Baustelle löschen?"))return;state.baustellen=state.baustellen.filter(x=>x.id!==b.id);if(state.activeId===b.id)state.activeId=null;saveState();rebuild();});
      topRow.appendChild(nameDiv);topRow.appendChild(delBtn);body.appendChild(topRow);
      const stats=document.createElement("div");stats.className="grid3";stats.style.marginTop="12px";
      for(const[l,v]of[["Eigene Std.",ih.toFixed(0)+"h"],["Pers. Std.",ph.toFixed(0)+"h"],["Material",matS>0?matS.toFixed(0)+"€":"–"]]){
        stats.innerHTML+=`<div class="mini-stat"><div class="mini-stat-val" style="color:${col}">${v}</div><div class="mini-stat-lbl">${l}</div></div>`;
      }
      body.appendChild(stats);card.appendChild(body);
      card.addEventListener("click",()=>setState({activeId:b.id,page:"planung"}));
      content.appendChild(card);
    }
    wrap.appendChild(content);
  };
  rebuild();return wrap;
}

// ── GLOBALER KALENDER (ohne aktives Projekt) ──────────────────────────────────
function renderKalenderGlobal(){
  const wrap=document.createElement("div");wrap.className="page";
  const d0=new Date();
  let cal={year:d0.getFullYear(),month:d0.getMonth()};
  const rebuild=()=>{
    wrap.innerHTML="";
    wrap.appendChild(makeHeader("Kalender","Alle Baustellen"));
    const content=document.createElement("div");content.style.cssText="padding:12px 14px";
    content.appendChild(buildCalendar(cal,state.baustellen,null,(newCal)=>{cal=newCal;rebuild();},(ds,bId)=>{if(bId){state.activeId=bId;state.page="planung";}setState({activeId:bId||state.activeId,page:bId?"planung":"uebersicht"});}));
    // Legende
    if(state.baustellen.length){
      const leg=document.createElement("div");leg.style.cssText="margin-top:4px";
      const lt=document.createElement("div");lt.style.cssText="font-size:12px;color:#5a8a5a;font-weight:bold;margin-bottom:8px";lt.textContent="Baustellen:";leg.appendChild(lt);
      for(let i=0;i<state.baustellen.length;i++){
        const b=state.baustellen[i];
        const row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer";
        row.innerHTML=`<span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${bc(i)};flex-shrink:0"></span><span style="font-size:13px;color:#1a2e1a">${esc(b.name)}</span><span style="font-size:11px;color:#9ab09a">📅 ${fmt(b.startdatum)}</span>`;
        row.addEventListener("click",()=>setState({activeId:b.id,page:"planung"}));
        leg.appendChild(row);
      }
      content.appendChild(leg);
    }
    wrap.appendChild(content);
  };
  rebuild();return wrap;
}

// ── SHARED CALENDAR BUILDER ───────────────────────────────────────────────────
function buildCalendar(cal,allBaustellen,activeBId,onNavChange,onDayClick){
  const calWrap=document.createElement("div");calWrap.className="cal-wrap";
  const calHead=document.createElement("div");calHead.className="cal-head";
  const prevBtn=document.createElement("button");prevBtn.className="cal-nav";prevBtn.textContent="‹";
  prevBtn.addEventListener("click",()=>onNavChange(cal.month===0?{year:cal.year-1,month:11}:{...cal,month:cal.month-1}));
  const nextBtn=document.createElement("button");nextBtn.className="cal-nav";nextBtn.textContent="›";
  nextBtn.addEventListener("click",()=>onNavChange(cal.month===11?{year:cal.year+1,month:0}:{...cal,month:cal.month+1}));
  const mt=document.createElement("span");mt.style.cssText="color:#2d6a4f;font-weight:bold;font-size:15px";mt.textContent=MONTHS[cal.month]+" "+cal.year;
  calHead.appendChild(prevBtn);calHead.appendChild(mt);calHead.appendChild(nextBtn);calWrap.appendChild(calHead);
  // Legend
  if(allBaustellen.length>1){
    const leg=document.createElement("div");leg.style.cssText="display:flex;flex-wrap:wrap;gap:6px;padding:0 10px 10px";
    for(let li=0;li<allBaustellen.length;li++){
      const lb=allBaustellen[li];const isAct=lb.id===activeBId;
      const dot=document.createElement("div");
      dot.style.cssText=`display:flex;align-items:center;gap:4px;font-size:10px;color:#5a8a5a;background:${bc(li)}15;border:1px solid ${bc(li)}44;border-radius:5px;padding:2px 7px${isAct?";font-weight:bold":""}`;
      dot.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${bc(li)}"></span>${esc(lb.name.slice(0,16))}`;
      leg.appendChild(dot);
    }
    calWrap.appendChild(leg);
  }
  const dayLabels=document.createElement("div");dayLabels.style.cssText="display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 4px";
  for(const d of DAYS){const dl=document.createElement("div");dl.className="cal-day-label";dl.textContent=d;dayLabels.appendChild(dl);}
  calWrap.appendChild(dayLabels);
  const grid=document.createElement("div");grid.className="cal-grid";
  const first=new Date(cal.year,cal.month,1);
  const dim=new Date(cal.year,cal.month+1,0).getDate();
  const sw=first.getDay();
  // Build allDayMap
  const allDayMap={};
  for(let bi=0;bi<allBaustellen.length;bi++){
    const bx=allBaustellen[bi];
    for(const t of(bx.tage||[])){
      if(!allDayMap[t.datum])allDayMap[t.datum]=[];
      allDayMap[t.datum].push({bx,t,col:bc(bi),isActive:bx.id===activeBId});
    }
  }
  const activeCol=activeBId?bc(allBaustellen.findIndex(x=>x.id===activeBId)):"#2d6a4f";
  for(let i=0;i<sw;i++)grid.appendChild(document.createElement("div"));
  for(let d=1;d<=dim;d++){
    const ds=`${cal.year}-${String(cal.month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const entries=allDayMap[ds]||[];
    const activeEntry=entries.find(e=>e.isActive);
    const otherEntries=entries.filter(e=>!e.isActive);
    const isT=ds===today();
    const hasConflict=entries.length>1;
    const cell=document.createElement("div");cell.className="cal-cell";cell.style.cursor="pointer";
    if(activeEntry)cell.style.background=activeCol+"18";
    else if(entries.length)cell.style.background=entries[0].col+"10";
    cell.style.border=hasConflict?"2px solid #c05c1a":isT?"2px solid #2d6a4f":activeEntry?`1px solid ${activeCol}55`:entries.length?`1px solid ${entries[0].col}44`:"1px solid #e0ead8";
    const num=document.createElement("div");num.className="cal-cell-num";
    num.style.color=isT?"#2d6a4f":hasConflict?"#c05c1a":"#5a8a5a";
    if(isT||hasConflict)num.style.fontWeight="bold";
    num.textContent=d;cell.appendChild(num);
    if(entries.length){
      const stripes=document.createElement("div");stripes.style.cssText="display:flex;gap:1px;margin-top:2px;height:4px;border-radius:2px;overflow:hidden";
      for(const e of entries){const s=document.createElement("div");s.style.cssText=`flex:1;background:${e.col};opacity:${e.isActive?1:0.7}`;stripes.appendChild(s);}
      cell.appendChild(stripes);
      if(activeEntry){
        const info=document.createElement("div");info.style.cssText=`font-size:9px;color:${activeCol};text-align:center;margin-top:1px;line-height:1.4`;
        info.textContent=activeEntry.t.stunden+"h";
        if((activeEntry.t.personal||[]).length)info.innerHTML+=`<br>👷${activeEntry.t.personal.length}`;
        if((activeEntry.t.maschinen||[]).length)info.innerHTML+=`<br>🚜${activeEntry.t.maschinen.length}`;
        cell.appendChild(info);
      }
      for(const e of otherEntries){const ob=document.createElement("div");ob.style.cssText=`font-size:8px;color:${e.col};text-align:center;line-height:1.3`;ob.textContent=e.bx.name.slice(0,5)+"…";cell.appendChild(ob);}
    }
    const clickedBId=entries.length===1?entries[0].bx.id:activeBId;
    cell.addEventListener("click",()=>onDayClick(ds,clickedBId));
    grid.appendChild(cell);
  }
  calWrap.appendChild(grid);
  // Conflict warning
  const conflictDays=Object.entries(allDayMap).filter(([ds,entries])=>{
    const y=parseInt(ds.slice(0,4)),mo=parseInt(ds.slice(5,7))-1;
    return entries.length>1&&y===cal.year&&mo===cal.month;
  });
  if(conflictDays.length){
    const cw=document.createElement("div");cw.style.cssText="background:#fff8f0;border:1px solid #c05c1a;border-radius:8px;padding:8px 12px;margin:0 8px 10px;font-size:12px;color:#c05c1a";
    cw.innerHTML="⚠️ Überschneidungen: "+conflictDays.map(([ds,entries])=>fmt(ds)+" ("+entries.map(e=>e.bx.name.slice(0,10)).join(", ")+")").join(" · ");
    calWrap.appendChild(cw);
  }
  return calWrap;
}

// ── PLANUNG ───────────────────────────────────────────────────────────────────
function renderPlanung(b){
  const wrap=document.createElement("div");wrap.className="page";
  const d0=new Date(b.startdatum||today());
  let cal={year:d0.getFullYear(),month:d0.getMonth()};
  let selDay=null;let settOpen=false;
  const updB=patch=>{state.baustellen=state.baustellen.map(x=>x.id===b.id?{...x,...patch}:x);Object.assign(b,patch);saveState();};
  const rebuild=()=>{
    wrap.innerHTML="";
    const rightBtn=makeBtn("⚙️","btn btn-ghost btn-small",()=>{settOpen=!settOpen;rebuild();});
    wrap.appendChild(makeHeader("Planung",b.name,rightBtn));
    const content=document.createElement("div");content.style.cssText="padding:12px 14px";
    if(settOpen){
      const sBox=document.createElement("div");sBox.className="card";
      const st=document.createElement("div");st.style.cssText="font-size:14px;color:#2d6a4f;font-weight:bold;margin-bottom:10px";st.textContent="Einstellungen";sBox.appendChild(st);
      const sg=document.createElement("div");sg.className="grid2";
      sg.appendChild(makeField("Eigener Std.satz €",makeInput("number",b.stundensatz,v=>{updB({stundensatz:parseFloat(v)||0});})));
      sg.appendChild(makeField("Maschinen Std.satz €",makeInput("number",b.maschinensatz,v=>{updB({maschinensatz:parseFloat(v)||0});})));
      sBox.appendChild(sg);
      const sg2=document.createElement("div");sg2.style.marginTop="10px";
      sg2.appendChild(makeField("Bauherr",makeInput("text",b.bauherr||"",v=>updB({bauherr:v}),"Name des Bauherrn")));
      sBox.appendChild(sg2);
      const sg3=document.createElement("div");sg3.style.marginTop="10px";
      const ata=makeInput("textarea",b.adresse||"",v=>updB({adresse:v}),"Straße, PLZ Ort");ata.style.minHeight="60px";
      sg3.appendChild(makeField("Rechnungsadresse",ata));sBox.appendChild(sg3);
      content.appendChild(sBox);
    }
    // Calendar using shared builder
    const calEl=buildCalendar(cal,state.baustellen,b.id,(newCal)=>{cal=newCal;rebuild();},(ds)=>{selDay=ds;rebuild();});
    content.appendChild(calEl);
    // Day form
    if(selDay){
      const tageMap={};(b.tage||[]).forEach(t=>tageMap[t.datum]=t);
      const existing=tageMap[selDay]||{datum:selDay,stunden:0,personal:[],maschinen:[],material:[],notiz:""};
      const df=JSON.parse(JSON.stringify(existing));
      content.appendChild(renderDayForm(df,b,()=>{
        const tage=(b.tage||[]).filter(t=>t.datum!==df.datum);tage.push(df);tage.sort((a,z)=>a.datum.localeCompare(z.datum));
        updB({tage});selDay=null;rebuild();
      },()=>{
        updB({tage:(b.tage||[]).filter(t=>t.datum!==df.datum)});selDay=null;rebuild();
      },()=>{selDay=null;rebuild();}));
    }
    // Cost summary + day list
    if((b.tage||[]).length>0&&!selDay){
      const tage=b.tage||[];
      const eigenSum=tage.reduce((a,t)=>a+(t.personal||[]).filter(p=>p.istIch).reduce((s,p)=>s+(p.stunden||0)*(p.stundensatz||b.stundensatz||55),0),0);
      const persSum=tage.reduce((a,t)=>a+(t.personal||[]).filter(p=>!p.istIch).reduce((s,p)=>s+(p.stunden||0)*(p.stundensatz||0),0),0);
      const mascSum=tage.reduce((a,t)=>a+(t.maschinen||[]).reduce((s,m)=>s+(m.stunden||0)*(m.stundensatz||0),0),0);
      const matSum=tage.reduce((a,t)=>a+(t.material||[]).reduce((s,m)=>s+(m.menge||0)*(m.preis||0),0),0);
      const netto=eigenSum+persSum+mascSum+matSum;
      const cbox=document.createElement("div");cbox.className="cost-box";
      const ct=document.createElement("div");ct.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px";
      const ctLabel=document.createElement("div");ctLabel.style.cssText="font-size:13px;color:#2d6a4f;font-weight:bold";ctLabel.textContent="💰 Voraussichtliche Gesamtkosten";
      const angebotBtn=document.createElement("button");angebotBtn.style.cssText="background:#2d6a4f;border:none;color:#fff;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:Georgia,serif;font-weight:600";angebotBtn.textContent="📄 Als Angebot drucken";
      angebotBtn.addEventListener("click",()=>printAngebot(b,state.firmendaten));
      ct.appendChild(ctLabel);ct.appendChild(angebotBtn);cbox.appendChild(ct);
      const kg=document.createElement("div");kg.className="grid2";kg.style.marginBottom="10px";
      for(const[l,v]of[["Eigenleistung",eigenSum],["Personal",persSum],["Maschinen",mascSum],["Material",matSum]]){
        if(v>0){const k=document.createElement("div");k.className="krow";k.innerHTML=`<div class="krow-label">${l}</div><div class="krow-val">${v.toFixed(2)} €</div>`;kg.appendChild(k);}
      }
      cbox.appendChild(kg);
      const dv=document.createElement("div");dv.style.cssText="border-top:1px solid #d8e8d0;padding-top:10px;display:flex;flex-direction:column;gap:4px";
      dv.innerHTML=`<div class="sum-line" style="font-size:13px;color:#5a8a5a"><span>Netto</span><span>${netto.toFixed(2)} €</span></div><div class="sum-line" style="font-size:13px;color:#9ab09a"><span>19 % MwSt.</span><span>${(netto*0.19).toFixed(2)} €</span></div><div class="sum-line" style="font-size:17px;font-weight:bold;color:#2d6a4f;border-top:1px solid #2d6a4f;padding-top:8px;margin-top:4px"><span>Gesamt brutto</span><span>${(netto*1.19).toFixed(2)} €</span></div>`;
      cbox.appendChild(dv);content.appendChild(cbox);
      const lt=document.createElement("div");lt.style.cssText="font-size:13px;color:#2d6a4f;font-weight:bold;margin-bottom:8px";lt.textContent=`Geplante Tage (${tage.length})`;content.appendChild(lt);
      for(const tag of tage){
        const de=document.createElement("div");de.className="day-entry";de.style.cursor="default";
        const top=document.createElement("div");top.style.cssText="display:flex;justify-content:space-between;align-items:center";
        const dateSpan=document.createElement("span");dateSpan.style.cssText="color:#2d6a4f;font-weight:bold;font-size:14px;cursor:pointer";dateSpan.textContent=fmt(tag.datum);
        dateSpan.addEventListener("click",()=>{selDay=tag.datum;rebuild();});
        const hSpan=document.createElement("span");hSpan.style.cssText="color:#5a8a5a;font-size:13px";
        const totalH=(tag.personal||[]).reduce((s,p)=>s+(p.stunden||0),0);
        hSpan.textContent="⏱ "+totalH+"h";
        top.appendChild(dateSpan);top.appendChild(hSpan);de.appendChild(top);
        const chips=document.createElement("div");chips.style.cssText="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px";
        for(const p of(tag.personal||[])){
          const c=document.createElement("span");c.className="chip";
          c.innerHTML=(p.istIch?"🧑‍💼 Ich":"👷 "+esc(p.name||"Personal"))+(p.istIch?`<span class="self-badge">ICH</span>`:"");
          chips.appendChild(c);
        }
        for(const m of(tag.maschinen||[]))chips.innerHTML+=`<span class="chip chip-dim">🚜 ${esc(m.name||"Maschine")}</span>`;
        if(tag.notiz)chips.innerHTML+=`<span class="chip chip-dim">💬 ${esc(tag.notiz.slice(0,30))}</span>`;
        de.appendChild(chips);
        const actions=document.createElement("div");actions.style.cssText="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap";
        const abs="background:#f0f8f0;border:1px solid #c8dcc0;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:12px;font-family:Georgia,serif;color:#2d6a4f";
        const eBtn=document.createElement("button");eBtn.style.cssText=abs;eBtn.textContent="✏️ Bearbeiten";eBtn.addEventListener("click",()=>{selDay=tag.datum;rebuild();});actions.appendChild(eBtn);
        const cBtn=document.createElement("button");cBtn.style.cssText=abs.replace("#2d6a4f","#5a8a5a");cBtn.textContent="📋 Kopieren";
        cBtn.addEventListener("click",()=>{
          const nd=prompt("Auf welches Datum kopieren? (TT.MM.JJJJ)","");if(!nd)return;
          const pts=nd.split(".");if(pts.length!==3){alert("Bitte TT.MM.JJJJ eingeben");return;}
          const iso=pts[2]+"-"+pts[1].padStart(2,"0")+"-"+pts[0].padStart(2,"0");
          if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)){alert("Ungültiges Datum");return;}
          if((b.tage||[]).find(t=>t.datum===iso)&&!confirm("Dieser Tag ist bereits geplant. Überschreiben?"))return;
          const copy=JSON.parse(JSON.stringify(tag));copy.datum=iso;
          const tage2=(b.tage||[]).filter(t=>t.datum!==iso);tage2.push(copy);tage2.sort((a,z)=>a.datum.localeCompare(z.datum));
          updB({tage:tage2});b.tage=tage2;rebuild();
        });actions.appendChild(cBtn);
        const mBtn=document.createElement("button");mBtn.style.cssText=abs.replace("#2d6a4f","#5a8a5a");mBtn.textContent="📅 Verschieben";
        mBtn.addEventListener("click",()=>{
          const nd=prompt("Verschieben auf welches Datum? (TT.MM.JJJJ)","");if(!nd)return;
          const pts=nd.split(".");if(pts.length!==3){alert("Bitte TT.MM.JJJJ eingeben");return;}
          const iso=pts[2]+"-"+pts[1].padStart(2,"0")+"-"+pts[0].padStart(2,"0");
          if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)){alert("Ungültiges Datum");return;}
          if(iso===tag.datum)return;
          if((b.tage||[]).find(t=>t.datum===iso)&&!confirm("Dieser Tag ist bereits geplant. Überschreiben?"))return;
          const moved=JSON.parse(JSON.stringify(tag));moved.datum=iso;
          const tage2=(b.tage||[]).filter(t=>t.datum!==tag.datum&&t.datum!==iso);
          tage2.push(moved);tage2.sort((a,z)=>a.datum.localeCompare(z.datum));
          updB({tage:tage2});b.tage=tage2;rebuild();
        });actions.appendChild(mBtn);
        de.appendChild(actions);content.appendChild(de);
      }
    }
    wrap.appendChild(content);
  };
  rebuild();return wrap;
}

// ── RECHNUNG ──────────────────────────────────────────────────────────────────
function renderRechnung(b){
  const wrap=document.createElement("div");wrap.className="page";
  const updB=patch=>{state.baustellen=state.baustellen.map(x=>x.id===b.id?{...x,...patch}:x);Object.assign(b,patch);saveState();};
  const eintraege=b.eintraege||[];
  let eigenH=0,eigenE=0;
  const pRows={},mRows={},matRows={};
  for(const e of eintraege){
    for(const p of(e.personalStunden||[])){
      if(p.istIch){eigenH+=p.stunden||0;eigenE+=(p.stunden||0)*(p.stundensatz||b.stundensatz||55);}
      else{const k=p.name+"__"+p.stundensatz;if(!pRows[k])pRows[k]={name:p.name,ss:p.stundensatz,h:0};pRows[k].h+=p.stunden||0;}
    }
    for(const m of(e.maschinenStunden||[])){const k=m.name+"__"+(m.stundensatz||0);if(!mRows[k])mRows[k]={name:m.name,ss:m.stundensatz||0,h:0};mRows[k].h+=m.stunden||0;}
    for(const m of(e.material||[])){const k=m.bezeichnung+"__"+m.einheit+"__"+m.preis;if(!matRows[k])matRows[k]={bz:m.bezeichnung,ei:m.einheit,pr:m.preis,mg:0};matRows[k].mg+=m.menge||0;}
  }
  const pArr=Object.values(pRows),mArr=Object.values(mRows),matArr=Object.values(matRows);
  const pT=pArr.reduce((a,p)=>a+p.h*(p.ss||0),0);

// ── SICHERUNG & WIEDERHERSTELLUNG ─────────────────────────────────────────────
function exportData(){
  const data=JSON.stringify({baustellen:state.baustellen,firmendaten:state.firmendaten,exportDatum:today(),version:1},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const datum=today();
  a.href=url;a.download=`BauManager_${datum}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  state.letzeSicherung=today();saveState();
  // Close overlay if open
  const ov=document.getElementById("backup-overlay");if(ov)ov.remove();
  document.body.style.overflow="";
}

function showRestoreDialog(){
  if(!confirm("⚠️ ACHTUNG: Alle aktuellen Daten werden durch die Sicherungsdatei ersetzt.\n\nBist du wirklich sicher?\n\nDieser Vorgang kann nicht rückgängig gemacht werden."))return;
  if(!confirm("Letzte Bestätigung: Wirklich wiederherstellen und aktuelle Daten überschreiben?"))return;
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.addEventListener("change",e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.baustellen)throw new Error("Ungültige Datei");
        state.baustellen=data.baustellen||[];
        state.firmendaten=data.firmendaten||state.firmendaten;
        state.activeId=null;state.page="uebersicht";
        saveState();render();
        alert("✅ Daten erfolgreich wiederhergestellt!");
      }catch(err){alert("❌ Fehler beim Lesen der Datei. Bitte eine gültige BauManager-Sicherungsdatei auswählen.");}
    };
    reader.readAsText(file);
  });
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

function checkBackupReminder(){
  const last=state.letzeSicherung;
  if(!last){
    // Noch nie gesichert - nach 1 Tag erinnern
    const created=state.baustellen.length>0;
    if(!created)return; // Noch keine Daten, keine Erinnerung nötig
  }
  const lastDate=last?new Date(last):new Date(0);
  const now=new Date();
  const diffDays=Math.floor((now-lastDate)/(1000*60*60*24));
  // Reminder key: today's date - show max once per day
  const reminderKey="backup_reminded_"+today();
  if(localStorage.getItem(reminderKey))return;
  if(diffDays>=1||!last){
    localStorage.setItem(reminderKey,"1");
    showBackupOverlay(diffDays,last);
  }
}

function showBackupOverlay(diffDays,last){
  const overlay=document.createElement("div");overlay.id="backup-overlay";
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px";
  const box=document.createElement("div");
  box.style.cssText="background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center";
  const icon=document.createElement("div");icon.style.cssText="font-size:52px;margin-bottom:12px";icon.textContent="💾";box.appendChild(icon);
  const title=document.createElement("div");title.style.cssText="font-size:18px;font-weight:bold;color:#1a2e1a;margin-bottom:8px";
  title.textContent=last?"Daten sichern":"Erste Datensicherung";box.appendChild(title);
  const msg=document.createElement("div");msg.style.cssText="font-size:14px;color:#5a8a5a;margin-bottom:20px;line-height:1.6";
  msg.textContent=last
    ?`Letzte Sicherung: ${fmt(last)} (vor ${diffDays} Tag${diffDays===1?"":"en"}).\nBitte sichere jetzt deine Daten.`
    :"Du hast noch keine Sicherung erstellt. Bitte jetzt sichern!";
  box.appendChild(msg);
  const saveBtn=document.createElement("button");
  saveBtn.style.cssText="background:#2d6a4f;color:#fff;border:none;border-radius:10px;padding:14px 0;width:100%;font-size:16px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;margin-bottom:10px";
  saveBtn.textContent="💾 Jetzt sichern";
  saveBtn.addEventListener("click",exportData);
  box.appendChild(saveBtn);
  const laterBtn=document.createElement("button");
  laterBtn.style.cssText="background:transparent;color:#9ab09a;border:1px solid #d8e8d0;border-radius:10px;padding:11px 0;width:100%;font-size:14px;cursor:pointer;font-family:Georgia,serif";
  laterBtn.textContent="Später erinnern";
  laterBtn.addEventListener("click",()=>{overlay.remove();document.body.style.overflow="";});
  box.appendChild(laterBtn);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  document.body.style.overflow="hidden";
}

// ── Start ─────────────────────────────────────────────────────────────────────
render();
setTimeout(checkBackupReminder, 800);
</script>
