<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Bau Manager</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#f4f6f3;color:#1a2e1a;font-family:Georgia,serif;overscroll-behavior:none}
input,select,textarea,button{font-family:Georgia,serif}
.page{min-height:100dvh;background:#f4f6f3;padding-bottom:88px}

#bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #d8e8d0;display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -2px 12px rgba(0,0,0,.08)}
.nav-btn{flex:1;background:none;border:none;color:#aac4aa;padding:10px 0 8px;cursor:default;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;margin-top:-2px;font-size:10px}
.nav-btn.active{color:#2d6a4f;border-top:2px solid #2d6a4f}
.nav-btn.enabled{cursor:pointer;color:#5a8a5a}
.nav-icon{font-size:22px;display:block}

.page-header{background:#fff;border-bottom:1px solid #d8e8d0;padding:12px 16px 10px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.header-brand{font-size:8px;color:#8aaa8a;letter-spacing:2px;text-transform:uppercase;margin-bottom:1px}
.header-title{font-size:18px;font-weight:bold;color:#2d6a4f}
.header-sub{font-size:12px;color:#5a8a5a;margin-top:1px}

.card{background:#fff;border:1px solid #d8e8d0;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-accent{border:2px solid #2d6a4f}
.inp{background:#f8faf7;border:1px solid #c8dcc0;border-radius:10px;color:#1a2e1a;padding:13px 14px;font-size:16px;width:100%;outline:none;-webkit-appearance:none;display:block}
.inp:focus{border-color:#2d6a4f;background:#fff}
.flabel{font-size:11px;color:#7a9a7a;margin-bottom:4px;letter-spacing:.3px;font-weight:600}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.btn{border:none;border-radius:10px;cursor:pointer;font-family:Georgia,serif;font-weight:600}
.btn-green{background:#2d6a4f;color:#fff;padding:13px 18px;font-size:15px}
.btn-ghost{background:transparent;border:1px solid #c8dcc0;color:#5a8a5a;padding:13px 18px;font-size:15px}
.btn-danger{background:#fdf0f0;border:1px solid #e8b0b0;color:#c04040;padding:13px 18px;font-size:15px}
.btn-small{padding:8px 14px;font-size:13px}
.btn-full{width:100%}
.btn-icon{background:none;border:none;cursor:pointer;font-size:20px;padding:4px 8px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin:12px 0 6px}
.sec-title{font-size:13px;color:#2d6a4f;font-weight:bold}
.sec-add{background:#f0f8f0;border:1px solid #c8dcc0;color:#2d6a4f;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px}
.item-row{background:#f8faf7;border:1px solid #e0ead8;border-radius:10px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.remove-btn{background:#fdf0f0;border:1px solid #e8b0b0;color:#c04040;border-radius:8px;padding:10px;cursor:pointer;font-size:13px;width:100%}
.sum-line{display:flex;justify-content:space-between;margin-bottom:6px}

.bau-card{background:#fff;border:1px solid #d8e8d0;border-radius:14px;overflow:hidden;margin-bottom:12px;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.06)}
.bau-stripe{height:5px}
.bau-body{padding:12px 14px 14px}
.mini-stat{background:#f4f6f3;border-radius:8px;padding:7px 6px;text-align:center}
.mini-stat-val{font-size:14px;font-weight:bold}
.mini-stat-lbl{font-size:10px;color:#9ab09a;margin-top:1px}

.dchip{background:#f4f6f3;border-radius:8px;padding:8px 10px}
.dchip-label{font-size:10px;color:#8aaa8a}
.dchip-val{font-size:14px;font-weight:bold;color:#1a2e1a}
.dchip-sub{font-size:11px;color:#5a8a5a}

.r-block{margin-bottom:14px}
.r-block-title{font-size:12px;color:#2d6a4f;font-weight:bold;margin-bottom:6px;border-bottom:1px solid #d8e8d0;padding-bottom:4px}
.r-row{display:flex;justify-content:space-between;align-items:flex-start;padding:4px 0}
.r-row-label{font-size:13px;color:#1a2e1a}
.r-row-det{font-size:11px;color:#8aaa8a}
.r-row-val{font-size:13px;color:#2d6a4f;min-width:80px;text-align:right;font-weight:600}

textarea.inp{resize:vertical;min-height:70px;line-height:1.6}
.empty{text-align:center;padding:60px 20px;color:#9ab09a}
.leistung-card{background:#fff;border:1px solid #d8e8d0;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.total-line{margin-top:10px;text-align:right;font-size:15px;font-weight:bold;color:#2d6a4f;border-top:1px solid #e0ead8;padding-top:8px}
.self-badge{background:#e8f4e8;border:1px solid #b0d4b0;border-radius:5px;font-size:10px;color:#2d6a4f;padding:1px 6px;margin-left:4px;font-weight:bold}

@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
  #bottom-nav,.page-header,.no-print{display:none!important}
  #print-overlay .no-print{display:none!important}
  #print-overlay{position:static!important;overflow:visible!important;background:#e8e8e8!important}
  body{overflow:auto!important;background:#fff!important;margin:0!important;padding:0!important}
  #print-overlay > div:last-child{margin:0!important;box-shadow:none!important;max-width:100%!important;width:100%!important}
  @page{margin:0;size:A4}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SK="baumanager_v5";
const load=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const save=(d)=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const uid=()=>Math.random().toString(36).slice(2,9);
const fmt=(d)=>{if(!d)return"–";const[y,m,dy]=d.split("-");return dy+"."+m+"."+y;};
const today=()=>new Date().toISOString().slice(0,10);
const esc=(s)=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const PALETTE=["#2d6a4f","#1e4d8c","#7b2d8b","#b5382a","#c05c1a","#2a7a8a","#5a6e1a","#7a3b1e"];
const bc=(i)=>PALETTE[i%PALETTE.length];

const makeInput=(type,value,onchange,placeholder="")=>{
  const el=document.createElement(type==="textarea"?"textarea":"input");
  if(type!=="textarea")el.type=type;
  el.className="inp";el.value=value??"";
  if(placeholder)el.placeholder=placeholder;
  el.addEventListener("input",e=>onchange(e.target.value));
  return el;
};
const makeSelect=(options,value,onchange)=>{
  const el=document.createElement("select");el.className="inp";
  for(const o of options){const opt=document.createElement("option");opt.value=o;opt.textContent=o;if(o===value)opt.selected=true;el.appendChild(opt);}
  el.addEventListener("change",e=>onchange(e.target.value));return el;
};
const makeLabel=(text)=>{const d=document.createElement("div");d.className="flabel";d.textContent=text;return d;};
const makeField=(label,inputEl)=>{const w=document.createElement("div");w.appendChild(makeLabel(label));w.appendChild(inputEl);return w;};
const makeBtn=(label,cls,onclick)=>{const b=document.createElement("button");b.className="btn "+cls;b.innerHTML=label;b.addEventListener("click",onclick);return b;};

const LOGO_SVG=`<svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
<rect width="44" height="44" rx="10" fill="#e8f4e8"/>
<rect x="0" y="30" width="44" height="14" fill="#c8e0b8"/>
<rect x="0" y="38" width="44" height="6" fill="#a0c890"/>
<rect x="6" y="20" width="16" height="12" fill="#fff" stroke="#2d6a4f" stroke-width="1.4"/>
<polygon points="6,20 14,12 22,20" fill="#2d6a4f"/>
<rect x="11" y="25" width="5" height="7" fill="#b0d4b0"/>
<rect x="27" y="25" width="3" height="9" fill="#8b5e3c"/>
<circle cx="28.5" cy="21" r="6" fill="#3a8a50"/>
<circle cx="25" cy="23" r="4" fill="#2d6a4f"/>
<circle cx="32" cy="23" r="4" fill="#4aaa60"/>
<rect x="1" y="31" width="14" height="6" rx="2" fill="#e8a020"/>
<rect x="3" y="28" width="9" height="4" rx="1" fill="#d09010"/>
<line x1="12" y1="30" x2="18" y2="26" stroke="#c07800" stroke-width="2" stroke-linecap="round"/>
<line x1="18" y1="26" x2="21" y2="30" stroke="#c07800" stroke-width="2" stroke-linecap="round"/>
<circle cx="4" cy="37" r="2.5" fill="#444"/>
<circle cx="12" cy="37" r="2.5" fill="#444"/>
</svg>`;

let state={baustellen:[],activeId:null,page:"uebersicht",firmendaten:{firmaName:"",steuernr:"",bank:"",iban:"",bic:"",tel:"",email:"",strasse:"",plzOrt:""},letzeSicherung:null};
const saved=load();
if(saved){state={...state,...saved};if(!state.firmendaten)state.firmendaten={firmaName:"",steuernr:"",bank:"",iban:"",bic:"",tel:"",email:"",strasse:"",plzOrt:""};}

function saveState(){save({baustellen:state.baustellen,activeId:state.activeId,firmendaten:state.firmendaten,letzeSicherung:state.letzeSicherung});}
function setState(patch){Object.assign(state,typeof patch==="function"?patch(state):patch);saveState();render();}
function getActive(){return state.baustellen.find(b=>b.id===state.activeId);}
function updBaustelle(id,patch){state.baustellen=state.baustellen.map(b=>b.id===id?{...b,...patch}:b);saveState();}

function render(){
  const app=document.getElementById("app");app.innerHTML="";
  const ab=getActive();
  let page;
  if(state.page==="uebersicht")page=renderUebersicht();
  else if(state.page==="leistung"&&ab)page=renderLeistung(ab);
  else if(state.page==="rechnung"&&ab)page=renderRechnung(ab);
  else page=renderUebersicht();
  app.appendChild(page);
  app.appendChild(renderBottomNav(ab));
}

function renderBottomNav(ab){
  const nav=document.createElement("nav");nav.id="bottom-nav";
  const items=[
    {key:"uebersicht",icon:"🏠",label:"Baustellen"},
    {key:"leistung",icon:"✅",label:"Leistung",needs:true},
    {key:"rechnung",icon:"🧾",label:"Rechnung",needs:true},
  ];
  for(const it of items){
    const disabled=it.needs&&!ab;
    const active=state.page===it.key;
    const btn=document.createElement("button");
    btn.className="nav-btn"+(active?" active":(!disabled?" enabled":""));
    btn.innerHTML=`<span class="nav-icon">${it.icon}</span>${it.label}`;
    if(!disabled)btn.addEventListener("click",()=>setState({page:it.key}));
    nav.appendChild(btn);
  }
  return nav;
}

function makeHeader(title,sub,rightEl){
  const h=document.createElement("div");h.className="page-header";
  const left=document.createElement("div");
  const fd=state.firmendaten;
  left.innerHTML=`<div class="header-brand">${esc(fd&&fd.firmaName?fd.firmaName:"Bau Manager")}</div><div class="header-title">${esc(title)}</div>${sub?`<div class="header-sub">${esc(sub)}</div>`:""}`;
  h.appendChild(left);
  if(rightEl)h.appendChild(rightEl);
  return h;
}

// ── ÜBERSICHT ─────────────────────────────────────────────────────────────────
function renderUebersicht(){
  const wrap=document.createElement("div");wrap.className="page";
  let showForm=false;
  let formData={name:"",startdatum:today(),bauherr:"",adresse:""};
  const rebuild=()=>{
    wrap.innerHTML="";
    const rightBtn=makeBtn(showForm?"✕":"+ Neu","btn btn-green btn-small",()=>{showForm=!showForm;rebuild();});
    wrap.appendChild(makeHeader("Meine Baustellen",null,rightBtn));
    const content=document.createElement("div");content.style.cssText="padding:12px 14px";
    if(showForm){
      const form=document.createElement("div");form.className="card card-accent";
      const t=document.createElement("div");t.style.cssText="font-size:15px;font-weight:bold;color:#2d6a4f;margin-bottom:14px";t.textContent="Neue Baustelle anlegen";form.appendChild(t);
      form.appendChild(makeField("Baustellen-Name *",makeInput("text",formData.name,v=>{formData.name=v;},"z.B. Mustermann – Terrasse")));
      const dw=document.createElement("div");dw.style.marginTop="12px";dw.appendChild(makeField("Startdatum",makeInput("date",formData.startdatum,v=>{formData.startdatum=v;})));form.appendChild(dw);
      const bw=document.createElement("div");bw.style.marginTop="12px";bw.appendChild(makeField("Bauherr / Auftraggeber",makeInput("text",formData.bauherr,v=>{formData.bauherr=v;},"Name des Bauherrn")));form.appendChild(bw);
      const aw=document.createElement("div");aw.style.marginTop="12px";const ata=makeInput("textarea",formData.adresse,v=>{formData.adresse=v;},"Straße, PLZ Ort");ata.style.minHeight="60px";aw.appendChild(makeField("Rechnungsadresse",ata));form.appendChild(aw);
      const br=document.createElement("div");br.style.cssText="display:flex;gap:10px;margin-top:16px";
      br.appendChild(makeBtn("✓ Anlegen","btn btn-green btn-full",()=>{
        if(!formData.name.trim())return;
        const b={id:uid(),name:formData.name.trim(),startdatum:formData.startdatum||today(),bauherr:formData.bauherr,adresse:formData.adresse,erstellt:today(),eintraege:[],stundensatz:55,maschinensatz:90,rechnungsNr:"",rechnungsdatum:"",angebotNr:"",bemerkungen:""};
        state.baustellen=[...state.baustellen,b];state.activeId=b.id;state.page="leistung";saveState();render();
      }));
      br.appendChild(makeBtn("Abbruch","btn btn-ghost",()=>{showForm=false;rebuild();}));
      form.appendChild(br);content.appendChild(form);
    }
    if(!state.baustellen.length&&!showForm){
      const empty=document.createElement("div");empty.className="empty";
      const logoDiv=document.createElement("div");logoDiv.style.cssText="width:80px;height:80px;margin:0 auto 16px";logoDiv.innerHTML=LOGO_SVG;empty.appendChild(logoDiv);
      empty.innerHTML+=`<div style="font-size:17px;color:#5a8a5a;margin-bottom:8px">Willkommen!</div><div style="font-size:13px;color:#9ab09a">Lege deine erste Baustelle an.</div>`;
      content.appendChild(empty);
    }
    for(let idx=0;idx<state.baustellen.length;idx++){
      const b=state.baustellen[idx];const col=bc(idx);
      const pSum=(b.eintraege||[]).reduce((a,e)=>a+(e.personalStunden||[]).reduce((s,p)=>s+(p.stunden||0),0),0);
      const matS=(b.eintraege||[]).reduce((a,e)=>a+(e.material||[]).reduce((s,m)=>s+(m.menge||0)*(m.preis||0),0),0);
      const total=(b.eintraege||[]).reduce((a,e)=>{
        const pS=(e.personalStunden||[]).reduce((s,p)=>s+(p.stunden||0)*(p.stundensatz||0),0);
        const mS=(e.maschinenStunden||[]).reduce((s,m)=>s+(m.stunden||0)*(m.stundensatz||0),0);
        return a+pS+mS+(e.material||[]).reduce((s,m)=>s+(m.menge||0)*(m.preis||0),0);
      },0);
      const card=document.createElement("div");card.className="bau-card";
      card.innerHTML=`<div class="bau-stripe" style="background:${col}"></div>`;
      const body=document.createElement("div");body.className="bau-body";
      const topRow=document.createElement("div");topRow.style.cssText="display:flex;justify-content:space-between;align-items:flex-start";
      const nd=document.createElement("div");nd.style.flex="1";
      nd.innerHTML=`<div style="font-size:17px;font-weight:bold;color:#1a2e1a">${esc(b.name)}</div><div style="font-size:13px;color:#5a8a5a;margin-top:4px">📅 ${fmt(b.startdatum)}${b.bauherr?` · 👤 ${esc(b.bauherr)}`:""}`;
      const delBtn=document.createElement("button");delBtn.style.cssText="background:none;border:none;color:#c0c0c0;font-size:22px;padding:0 0 0 12px;cursor:pointer";delBtn.textContent="✕";
      delBtn.addEventListener("click",e=>{e.stopPropagation();if(!confirm("Baustelle löschen?"))return;state.baustellen=state.baustellen.filter(x=>x.id!==b.id);if(state.activeId===b.id)state.activeId=null;saveState();rebuild();});
      topRow.appendChild(nd);topRow.appendChild(delBtn);body.appendChild(topRow);
      const stats=document.createElement("div");stats.className="grid3";stats.style.marginTop="12px";
      for(const[l,v]of[["Stunden",pSum.toFixed(0)+"h"],["Material",matS>0?matS.toFixed(0)+"€":"–"],["Gesamt",total>0?total.toFixed(0)+"€":"–"]]){
        stats.innerHTML+=`<div class="mini-stat"><div class="mini-stat-val" style="color:${col}">${v}</div><div class="mini-stat-lbl">${l}</div></div>`;
      }
      body.appendChild(stats);card.appendChild(body);
      card.addEventListener("click",()=>setState({activeId:b.id,page:"leistung"}));
      content.appendChild(card);
    }
    wrap.appendChild(content);
  };
  rebuild();return wrap;
}

// ── LEISTUNG ERBRACHT ─────────────────────────────────────────────────────────
function renderLeistung(b){
  const wrap=document.createElement("div");wrap.className="page";
  let showForm=false;
  const fresh=()=>({id:uid(),datum:today(),personalStunden:[],maschinenStunden:[],material:[],notiz:""});
  let form=fresh();
  const updB=patch=>{updBaustelle(b.id,patch);Object.assign(b,patch);};
  const rebuild=()=>{
    wrap.innerHTML="";
    const rightBtn=makeBtn(showForm?"✕":"+ Neu","btn btn-green btn-small",()=>{if(!showForm)form=fresh();showForm=!showForm;rebuild();});
    wrap.appendChild(makeHeader("Leistung erbracht:",b.name,rightBtn));
    const content=document.createElement("div");content.style.cssText="padding:12px 14px";
    if(showForm){
      const fbox=document.createElement("div");fbox.className="card card-accent";
      const ft=document.createElement("div");ft.style.cssText="font-size:15px;color:#2d6a4f;font-weight:bold;margin-bottom:12px";ft.textContent="Tagesbericht erfassen";fbox.appendChild(ft);
      const g2=document.createElement("div");g2.className="grid2";g2.style.marginBottom="4px";
      g2.appendChild(makeField("Datum",makeInput("date",form.datum,v=>{form.datum=v;})));
      g2.appendChild(makeField("Notizen",makeInput("text",form.notiz,v=>{form.notiz=v;},"z.B. Notiz zum Tag…")));
      fbox.appendChild(g2);

      // Personal inkl. Ich
      const sh=document.createElement("div");sh.className="sec-head";
      const st=document.createElement("span");st.className="sec-title";st.textContent="👷 Personal & eigene Arbeit";
      const addBtn=document.createElement("button");addBtn.className="sec-add";addBtn.textContent="+ hinzufügen";
      addBtn.addEventListener("click",()=>{
        const menu=document.createElement("div");menu.style.cssText="position:fixed;background:#fff;border:1px solid #d8e8d0;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:5000;min-width:220px;overflow:hidden";
        const o1=document.createElement("div");o1.style.cssText="padding:14px 16px;cursor:pointer;font-size:14px;color:#2d6a4f;font-weight:bold;border-bottom:1px solid #e8f4e8;background:#f8fdf8";o1.textContent="🧑‍💼 Ich (Inhaber)";
        o1.addEventListener("click",()=>{form.personalStunden.push({id:uid(),name:"Ich",istIch:true,stunden:0,stundensatz:0});menu.remove();rebuild();});
        const o2=document.createElement("div");o2.style.cssText="padding:14px 16px;cursor:pointer;font-size:14px;color:#1a2e1a";o2.textContent="👷 Mitarbeiter / Subunternehmer";
        o2.addEventListener("click",()=>{form.personalStunden.push({id:uid(),name:"",istIch:false,stunden:0,stundensatz:0});menu.remove();rebuild();});
        menu.appendChild(o1);menu.appendChild(o2);document.body.appendChild(menu);
        const r=addBtn.getBoundingClientRect();
        menu.style.top=(r.bottom+window.scrollY+4)+"px";
        menu.style.right=(window.innerWidth-r.right)+"px";
        setTimeout(()=>document.addEventListener("click",()=>menu.remove(),{once:true}),50);
      });
      sh.appendChild(st);sh.appendChild(addBtn);fbox.appendChild(sh);
      for(const p of form.personalStunden){
        const irow=document.createElement("div");irow.className="item-row";
        if(p.istIch){irow.style.cssText="background:#f0f8f0;border:1px solid #b0d4b0;border-radius:10px;padding:10px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px";
          const badge=document.createElement("div");badge.style.cssText="font-size:13px;font-weight:bold;color:#2d6a4f";badge.textContent="🧑‍💼 Meine eigene Arbeit";irow.appendChild(badge);}
        else irow.appendChild(makeInput("text",p.name,v=>p.name=v,"Name des Mitarbeiters"));
        const r2=document.createElement("div");r2.style.cssText="display:flex;gap:8px";
        r2.appendChild(makeField("Stunden",makeInput("number","",v=>{p.stunden=parseFloat(v)||0;},p.stunden>0?String(p.stunden):"")));
        r2.appendChild(makeField(p.istIch?"€/Std.":"€/Std.",makeInput("number","",v=>{p.stundensatz=parseFloat(v)||0;},p.stundensatz>0?String(p.stundensatz):"")));
        irow.appendChild(r2);
        const tot=document.createElement("div");tot.style.cssText="font-size:12px;color:#5a8a5a;text-align:right";tot.textContent="= "+((p.stunden||0)*(p.stundensatz||0)).toFixed(2)+" €";irow.appendChild(tot);
        const db=document.createElement("button");db.className="remove-btn";db.textContent="Entfernen";db.addEventListener("click",()=>{form.personalStunden=form.personalStunden.filter(x=>x.id!==p.id);rebuild();});irow.appendChild(db);
        fbox.appendChild(irow);
      }

      // Maschinen
      const msh=document.createElement("div");msh.className="sec-head";
      const mst=document.createElement("span");mst.className="sec-title";mst.textContent="🚜 Maschinen";

      card.appendChild(chips);
      const totLine=document.createElement("div");totLine.className="total-line";totLine.textContent=total.toFixed(2)+" €";card.appendChild(totLine);

    wrap.appendChild(content);
  };
  rebuild();return wrap;
}

  const toolbar=document.createElement("div");toolbar.className="no-print";
  toolbar.style.cssText="position:sticky;top:0;background:#2d6a4f;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.2)";
  const printBtn=document.createElement("button");printBtn.style.cssText="background:#fff;color:#2d6a4f;border:none;border-radius:7px;padding:10px 20px;cursor:pointer;font-size:14px;font-weight:bold";printBtn.textContent="🖨️ Drucken / Als PDF speichern";
  printBtn.title="Tipp: Im Druckdialog unter Weitere Einstellungen → Hintergrundgrafiken aktivieren";
  printBtn.addEventListener("click",()=>{
    // Ensure background graphics setting hint
    window.print();
  });
  const typ13bBadge=ist13b?`<span style="background:#fff3e0;color:#c05c1a;border:1px solid #c05c1a;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:bold">§ 13b UStG</span>`:"";
  const closeBtn=document.createElement("button");closeBtn.style.cssText="background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.4);border-radius:7px;padding:10px 14px;cursor:pointer;font-size:14px;margin-left:auto";closeBtn.textContent="✕ Schließen";closeBtn.addEventListener("click",()=>{overlay.remove();document.body.style.overflow="";});
  const hint=document.createElement("div");
  hint.className="no-print";
  hint.style.cssText="font-size:11px;color:rgba(255,255,255,.7);margin-left:8px;max-width:200px;line-height:1.4";
  hint.textContent="💡 Tipp: Im Druckdialog → Weitere Einstellungen → Hintergrundgrafiken aktivieren";
  toolbar.appendChild(hint);
  toolbar.appendChild(printBtn);if(ist13b)toolbar.insertAdjacentHTML("beforeend",typ13bBadge);toolbar.appendChild(closeBtn);overlay.appendChild(toolbar);

  const doc=document.createElement("div");
  doc.style.cssText="max-width:794px;margin:24px auto 40px;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.15);font-family:Arial,Helvetica,sans-serif";
  doc.innerHTML=`
    <!-- KOPFZEILE -->
    <div style="background:#2d6a4f;padding:32px 40px 28px;display:flex;justify-content:space-between;align-items:flex-start;-webkit-print-color-adjust:exact;print-color-adjust:exact">
      <div style="display:flex;align-items:flex-start;gap:16px">
        <div style="width:52px;height:52px;flex-shrink:0">${LOGO_SVG}</div>
        <div>
          <div style="font-size:24px;font-weight:bold;color:#fff;letter-spacing:.5px;white-space:pre-line;line-height:1.25">${esc(fd.firmaName||"Firmenname eintragen")}</div>
          ${fd.strasse?`<div style="font-size:13px;color:#a8d4a8;margin-top:4px">${esc(fd.strasse)}</div>`:""}
          <div style="font-size:13px;color:#a8d4a8;margin-top:2px">${[fd.tel?`Tel.: ${esc(fd.tel)}`:"",fd.email?`E-Mail: ${esc(fd.email)}`:""].filter(Boolean).join(" · ")}</div>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:28px;font-weight:bold;color:#fff;letter-spacing:1px">RECHNUNG</div>
        ${ist13b?`<div style="background:#c05c1a;color:#fff;border-radius:5px;padding:3px 10px;font-size:12px;font-weight:bold;margin-top:4px;display:inline-block">§ 13b UStG</div>`:""}
      </div>
    </div>

    <!-- RECHNUNGSINFOS -->
    <div style="background:#f8fdf8;padding:20px 40px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #d8e8d0;-webkit-print-color-adjust:exact;print-color-adjust:exact">
      <div>
        <div style="font-size:10px;color:#8aaa8a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Rechnungsempfänger</div>
        <div style="font-size:15px;font-weight:bold;color:#1a2e1a">${esc(b.bauherr||"—")}</div>
        ${b.adresse?`<div style="font-size:13px;color:#5a8a5a;margin-top:2px;white-space:pre-line">${esc(b.adresse)}</div>`:""}
      </div>
      <div style="text-align:right">
        <table style="font-size:13px;border-collapse:collapse">
          <tr><td style="color:#8aaa8a;padding:2px 12px 2px 0">Rechnungsnr.:</td><td style="font-weight:bold;color:#1a2e1a">${esc(rNr)}</td></tr>
          <tr><td style="color:#8aaa8a;padding:2px 12px 2px 0">Datum:</td><td style="color:#1a2e1a">${rDatum}</td></tr>
          <tr><td style="color:#8aaa8a;padding:2px 12px 2px 0">Baustelle:</td><td style="color:#1a2e1a">${esc(b.name)}</td></tr>

        </table>
      </div>
    </div>

    <!-- LEISTUNGSBESCHREIBUNG -->
    <div style="padding:0 40px">
      <p style="font-size:13px;color:#5a8a5a;padding:16px 0 8px">Für die erbrachten Leistungen erlaube ich mir, folgendes in Rechnung zu stellen:</p>
      <table style="width:100%;border-collapse:collapse;margin-bottom:0">
        <thead>
          <tr style="background:#f0f7f0;-webkit-print-color-adjust:exact;print-color-adjust:exact">
            <th style="padding:10px 14px;text-align:left;font-size:11px;color:#5a8a5a;text-transform:uppercase;letter-spacing:.5px;font-weight:600;width:32px">Pos.</th>
            <th style="padding:10px 14px;text-align:left;font-size:11px;color:#5a8a5a;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Leistung / Material</th>
            <th style="padding:10px 14px;text-align:right;font-size:11px;color:#5a8a5a;text-transform:uppercase;letter-spacing:.5px;font-weight:600">Betrag</th>
          </tr>
        </thead>
        <tbody>${posHTML}</tbody>
        <tfoot>
          <tr><td colspan="3" style="padding:8px 0"></td></tr>
          <tr><td colspan="2" style="padding:8px 14px;font-size:13px;color:#666;border-top:1px solid #e0e0e0">Nettobetrag</td><td style="padding:8px 14px;text-align:right;font-size:13px;font-weight:bold;border-top:1px solid #e0e0e0">${netto.toFixed(2)} €</td></tr>
          ${steuerzeile}
          <tr><td colspan="3" style="padding:4px 0;border-top:2px solid #2d6a4f"></td></tr>
          ${bruttozeile}

      </table>

    <!-- BEMERKUNGEN -->
    ${b.bemerkungen?`<div style="padding:20px 40px 0;font-size:13px;color:#444;line-height:1.7"><strong>Bemerkungen:</strong><br>${esc(b.bemerkungen)}</div>`:""}

    <!-- ZAHLUNGSINFO -->
    <div style="padding:24px 40px;background:#f8fdf8;border-top:1px solid #e0ead8;margin-top:16px;-webkit-print-color-adjust:exact;print-color-adjust:exact">
      <p style="font-size:13px;color:#1a2e1a;margin-bottom:16px">Bitte überweisen Sie den Rechnungsbetrag innerhalb von <strong>14 Tagen</strong> auf folgendes Konto:</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:13px">

          ${fd.bic?`<div><span style="color:#8aaa8a">BIC:</span> ${esc(fd.bic)}</div>`:""}
        </div>
        <div style="text-align:right">
          ${fd.steuernr?`<div style="margin-bottom:4px"><span style="color:#8aaa8a">Steuernummer:</span> ${esc(fd.steuernr)}</div>`:""}
          ${ist13b?`<div style="background:#fff3e0;border:1px solid #f0c080;border-radius:5px;padding:8px 12px;font-size:12px;color:#8a5a00;margin-top:4px">Die Umsatzsteuer ist vom Leistungsempfänger nach § 13b UStG zu entrichten.</div>`:""}

    <!-- FUSSZEILE -->
    <div style="padding:16px 40px;border-top:1px solid #e0ead8;margin-top:16px;text-align:center;font-size:11px;color:#aaa">

    </div>`;

  overlay.appendChild(doc);document.body.appendChild(overlay);document.body.style.overflow="hidden";

// ── SICHERUNG & WIEDERHERSTELLUNG ─────────────────────────────────────────────
function exportData(){
  const data=JSON.stringify({baustellen:state.baustellen,firmendaten:state.firmendaten,exportDatum:today(),version:1},null,2);
  const blob=new Blob([data],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`BauManager_${today()}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  state.letzeSicherung=today();saveState();
  const ov=document.getElementById("backup-overlay");if(ov)ov.remove();
  document.body.style.overflow="";
}

function showRestoreDialog(){
  if(!confirm("⚠️ ACHTUNG: Alle aktuellen Daten werden durch die Sicherungsdatei ersetzt.\n\nBist du wirklich sicher?"))return;
  if(!confirm("Letzte Bestätigung: Wirklich wiederherstellen und aktuelle Daten überschreiben?"))return;
  const input=document.createElement("input");input.type="file";input.accept=".json";
  input.addEventListener("change",e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.baustellen)throw new Error("Ungültige Datei");
        state.baustellen=data.baustellen||[];state.firmendaten=data.firmendaten||state.firmendaten;
        state.activeId=null;state.page="uebersicht";saveState();render();
        alert("✅ Daten erfolgreich wiederhergestellt!");
      }catch{alert("❌ Fehler beim Lesen der Datei.");}
    };
    reader.readAsText(file);
  });
  document.body.appendChild(input);input.click();document.body.removeChild(input);
}

function checkBackupReminder(){
  if(!state.baustellen.length)return;
  const last=state.letzeSicherung;
  const lastDate=last?new Date(last):new Date(0);
  const diffDays=Math.floor((new Date()-lastDate)/(1000*60*60*24));
  const key="backup_reminded_"+today();
  if(localStorage.getItem(key))return;
  if(diffDays>=1||!last){localStorage.setItem(key,"1");showBackupOverlay(diffDays,last);}
}

function showBackupOverlay(diffDays,last){
  const overlay=document.createElement("div");overlay.id="backup-overlay";
  overlay.style.cssText="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.55);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px";
  const box=document.createElement("div");
  box.style.cssText="background:#fff;border-radius:16px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.2);text-align:center";
  box.innerHTML=`<div style="font-size:52px;margin-bottom:12px">💾</div><div style="font-size:18px;font-weight:bold;color:#1a2e1a;margin-bottom:8px">${last?"Daten sichern":"Erste Datensicherung"}</div><div style="font-size:14px;color:#5a8a5a;margin-bottom:20px;line-height:1.6">${last?`Letzte Sicherung: ${fmt(last)} (vor ${diffDays} Tag${diffDays===1?"":"en"}).<br>Bitte jetzt sichern!`:"Du hast noch keine Sicherung erstellt.<br>Bitte jetzt sichern!"}</div>`;
  const saveBtn=document.createElement("button");saveBtn.style.cssText="background:#2d6a4f;color:#fff;border:none;border-radius:10px;padding:14px 0;width:100%;font-size:16px;font-weight:bold;cursor:pointer;margin-bottom:10px";saveBtn.textContent="💾 Jetzt sichern";saveBtn.addEventListener("click",exportData);box.appendChild(saveBtn);
  const laterBtn=document.createElement("button");laterBtn.style.cssText="background:transparent;color:#9ab09a;border:1px solid #d8e8d0;border-radius:10px;padding:11px 0;width:100%;font-size:14px;cursor:pointer";laterBtn.textContent="Später erinnern";laterBtn.addEventListener("click",()=>{overlay.remove();document.body.style.overflow="";});box.appendChild(laterBtn);
  overlay.appendChild(box);document.body.appendChild(overlay);document.body.style.overflow="hidden";
}

// ── Start ─────────────────────────────────────────────────────────────────────
render();
setTimeout(checkBackupReminder,800);
</script>
